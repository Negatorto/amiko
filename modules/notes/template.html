<div class="amiko-module" data-module-type="notes">
    <div class="module-header">
        <span class="module-title">📝 Notes</span>
        <div class="module-actions">
            <button class="btn-expand" title="Expand/Collapse">⤢</button>
            <button class="btn-close" title="Close Module">❌</button>
        </div>
    </div>
    <div class="mod-notes-bar">
        <span class="mod-notes-host">Not connected</span>
        <span class="mod-notes-status">⏳ Ready</span>
    </div>
    <div class="module-body" style="padding: 0;">
        <textarea class="mod-notes-textarea"
            style="width: 100%; height: 100%; box-sizing: border-box; resize: none; background: transparent; color: var(--text-primary); border: none; outline: none; padding: 10px; font-family: monospace; font-size: 13px;"
            placeholder="// Connect to a server to use notes..." disabled></textarea>
    </div>
</div>
