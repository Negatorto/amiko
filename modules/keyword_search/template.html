<div class="amiko-module" data-module-type="keyword_search">
    <div class="module-header">
        <span class="module-title">🔍 Keyword Search</span>
        <div class="module-actions">
            <button class="btn-expand" title="Expand/Collapse">⤢</button>
            <button class="btn-close" title="Close Module">❌</button>
        </div>
    </div>
    <div class="module-body">
        <form class="form-grid amiko-mod-form">
            <div class="form-group">
                <label>Remote Path</label>
                <input type="text" class="mod-path" placeholder="/var/www/html" required>
            </div>
            <div class="form-group">
                <label>Keyword</label>
                <input type="text" class="mod-keyword" placeholder="search_term" required>
            </div>
            <div class="form-group">
                <label>Case Sensitive</label>
                <select class="mod-case-sensitive">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button type="submit" class="mod-btn-submit">START SEARCH</button>
            </div>
        </form>
        <div class="terminal-container" style="flex: 1;">
            <div class="terminal-body large mod-terminal" style="height: 100%;">
                <div class="log-entry log-dim">// Ready for operation...</div>
            </div>
        </div>
    </div>
</div>
